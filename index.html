<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lukael Research Reports</title>
  <meta name="description" content="Research notes and project reports.">
  <link rel="stylesheet" href="styles/site.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <p class="kicker">Lukael Research</p>
      <h1>Research Reports</h1>
      <p class="intro">실험과 보고서를 모아둔 리서치 아카이브입니다.</p>
    </div>
  </header>

  <main>
    <section class="section-header" aria-labelledby="active-projects">
      <div>
        <p class="eyebrow">Archive</p>
        <h2 id="active-projects">Project Reports</h2>
      </div>
    </section>

    <section class="report-grid" aria-label="Project report list">
      <article class="report-card">
        <img src="projects/fm-fpm/assets/thumbnail.png" alt="FM-FPM complex object construction preview" loading="lazy">
        <div class="card-topline">
          <span class="status status-complete">Published</span>
          <span>FM-FPM</span>
        </div>
        <h3>FM-FPM 검증 보고서</h3>
        <p>Frequency-coded event-camera Fourier ptychographic microscopy의 Milestone 1-6 검증과 관련 연구 조사 요약.</p>
        <a class="card-link" href="projects/fm-fpm/">보고서 열기</a>
      </article>
    </section>
  </main>

  <footer>
    <span>Lukael Research Reports</span>
  </footer>
</body>
</html>
