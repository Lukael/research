seed: 3342
device: auto
output_dir: outputs
experiment_name: synthetic_gaussian_ri
grid:
  H: 64
  W: 64
  num_slices: 16
  pixel_size: 1.0e-06
  dz: 1.0e-06
optics:
  wavelength: 5.32e-07
  n0: 1.0
  integrated_slices: true
  sensor_distance: 0.0
  focus_at_center: true
  numerical_aperture: null
synthetic:
  object_type: multiple_gaussians
  num_blobs: 6
  delta_n_scale: 0.02
  noise_std: 0.0
model:
  num_gaussians: 32
  delta_n_scale: 0.03
  init_extent_xy: 3.2e-05
  init_extent_z: 1.6e-05
  init_sigma: 4.0e-06
  min_sigma: 3.0e-07
training:
  num_steps: 50
  lr: 0.03
  log_every: 10
  save_every: 0
  regularization:
    scale_min_weight: 1.0e-05
    contrast_weight: 0.0001
    mass_weight: 0.0001
    sparsity_weight: 1.0e-05
baseline:
  enabled: true
  num_steps: 20
  lr: 0.02
